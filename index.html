<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreationCue™ | Wear OS Hub</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c;
            --bg: #050505;
            --card-bg: #111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        header {
            position: relative;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('logo-back.png');
            background-size: cover;
            background-position: center;
        }

        .logo { max-width: 90px; margin-bottom: 15px; }
        h1 { font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary); }
        .tagline { color: var(--text-dim); font-size: 1rem; margin-top: 10px; }

        /* Updated Stats Grid for 6 Items */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            max-width: 1200px;
            margin: -30px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 18px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); background: #181818; }
        
        .stat-value { display: block; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 5px; font-weight: 700; }

        /* Watch Face Container */
        .content-width { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #faces-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    padding-top: 8px;
}

        .face-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .face-card:hover { border-color: var(--primary); background: #181818; transform: translateY(-5px); }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: black;
            font-weight: 900;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            z-index: 5;
        }

        .face-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .btn-play {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 10px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-top: 10px;
            width: 85%;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .stats-container { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-value { font-size: 1.1rem; }
            .stat-label { font-size: 0.55rem; }

            #faces-container {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 12px;
                padding-bottom: 20px;
                scrollbar-width: none;
            }
            #faces-container::-webkit-scrollbar { display: none; }
            .face-card { flex: 0 0 31%; min-width: 110px; padding: 10px; scroll-snap-align: center; }
            .face-card h3 { font-size: 0.7rem; }
            .btn-play { font-size: 0.55rem; }
        }

        footer { text-align: center; padding: 60px 20px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }
        .footer-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .footer-link { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png" alt="Creation Cue" class="logo">
        <h1>CREATION<span>CUE™</span></h1>
        <p class="tagline">Wear OS watch faces.</p>
    </header>

    <section class="stats-container">
        <!-- 1. Downloads -->
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-card">
            <span class="stat-value">300K+</span>
            <span class="stat-label">Downloads</span>
        </a>
        <!-- 2. S. Korea -->
        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Personalization)</span>
        </div>
        <!-- 3. YouTube -->
        <a href="https://www.youtube.com/watch?v=zoD0DCDpLrA&list=PLq_hih0jW64xYQhELgx--6_NI9pwlsRbD" target="_blank" class="stat-card">
            <span class="stat-value"><svg style="width:24px; fill:currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></span>
            <span class="stat-label">Featured - Top10 by Android Authority</span>
        </a>
        <!-- 4. Huawei Partner -->
        <div class="stat-card">
            <span class="stat-value">Huawei</span>
            <span class="stat-label">Partner</span>
        </div>
        <!-- 5. Rank -->
        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Rank</span>
        </div>
        <!-- 6. Designs -->
        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Designs</span>
        </div>
    </section>

    <div class="content-width">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin:0; font-size: 1.2rem;">FEATURED DESIGNS</h2>
            <span style="color: #444; font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;">SWIPE TO BROWSE</span>
        </div>
        <div id="faces-container">
            <!-- Loading designs... -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CreationCue™. Stats verified via Play Store & AppBrain.</p>
        <div class="footer-links">
            <a href="mailto:creationcuespace@gmail.com" class="footer-link">Email Us</a>
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const container = document.getElementById('faces-container');
            try {
                const response = await fetch('badge_text_faces.json');
                const data = await response.json();

                // Dynamic Logic: Skip first 2 cards
                const facesToShow = data.watch_faces.slice(2);

                facesToShow.forEach((face, index) => {
                    const card = document.createElement('a');
                    card.className = 'face-card';
                    card.target = '_blank';

                    // Dynamic Link Conversion (Market to Web)
                    let rawUrl = face.play_store_url;
                    let webUrl = rawUrl.startsWith('market://details?id=') ? 
                                rawUrl.replace('market://details?id=', 'https://play.google.com/store/apps/details?id=') : 
                                rawUrl.startsWith('market://dev?id=') ? 
                                rawUrl.replace('market://dev?id=', 'https://play.google.com/store/apps/dev?id=') : 
                                rawUrl;
                    
                    card.href = webUrl;

                    // Dynamic Last Item Button Text
                    const isLast = index === facesToShow.length - 1;
                    const buttonText = isLast ? "CreationCue" : "GOOGLE PLAY";

                    const badgeHtml = face.badge_text ? `<div class="badge">${face.badge_text}</div>` : '';

                    card.innerHTML = `
                        ${badgeHtml}
                        <img src="${face.image_url}" alt="${face.title}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3 style="margin: 10px 0; font-size: 0.9rem;">${face.title}</h3>
                        <div class="btn-play">${buttonText}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("JSON Error:", e);
                container.innerHTML = `<p style="text-align:center; width:100%; color:#555;">Designs loading...</p>`;
            }
        }
        loadContent();
    </script>
</body>
</html>
