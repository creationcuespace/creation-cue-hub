<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Premium Watch Faces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-text { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Mobile Carousel Styles */
        @media (max-width: 768px) {
            .mobile-carousel {
                display: flex !important;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 16px;
                padding-bottom: 20px;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }
            .mobile-carousel::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */
            
            .watch-card {
                flex: 0 0 80%; /* Shows 80% of one card so the next is visible */
                scroll-snap-align: center;
            }
        }

        .watch-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans">

    <header class="relative py-16 px-6 text-center border-b border-neutral-800 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-neutral-900 to-neutral-950">
        <img src="https://creationcue.space/wp-content/uploads/2025/05/ccLogo-3.png" alt="Creation Cue Logo" class="h-24 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
        
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter">CREATION <span class="gradient-text">CUE</span></h1>
        <p class="text-lg text-neutral-400 max-w-2xl mx-auto">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 text-center">
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fas fa-trophy text-amber-500 mb-2"></i>
                <h3 class="font-bold text-sm">#2 S. Korea</h3>
            </div>
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fab fa-youtube text-red-600 mb-2"></i>
                <h3 class="font-bold text-sm">Featured</h3>
            </div>
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fas fa-handshake text-blue-500 mb-2"></i>
                <h3 class="font-bold text-sm">Huawei Partner</h3>
            </div>
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fas fa-star text-yellow-400 mb-2"></i>
                <h3 class="font-bold text-sm">Top 1% Dev</h3>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-12 px-6">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-2xl font-bold italic">Latest Designs</h2>
            <p class="text-xs text-neutral-500 md:hidden">Swipe to explore →</p>
        </div>
        
        <div id="watch-gallery" class="mobile-carousel grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </section>

    <footer class="py-12 border-t border-neutral-900 text-center text-neutral-600">
        <div class="flex justify-center gap-6 mb-4">
            <a href="mailto:support@creationcue.space" class="hover:text-amber-500"><i class="fas fa-envelope"></i></a>
            <a href="https://play.google.com/store/apps/dev?id=7609098870161748513" class="hover:text-amber-500"><i class="fab fa-google-play"></i></a>
        </div>
        <p class="text-xs uppercase tracking-widest">&copy; 2026 Creation Cue Space</p>
    </footer>

    <script>
        const JSON_URL = 'https://cdn.jsdelivr.net/gh/creationcuespace/creation-cue-hub@main/badge_text_faces.json';

        async function loadGallery() {
            const gallery = document.getElementById('watch-gallery');
            try {
                const response = await fetch(JSON_URL);
                const rawData = await response.json();
                const data = rawData.watch_faces;
                
                gallery.innerHTML = ''; 

                data.forEach(face => {
                    let webUrl = face.play_store_url.replace('market://', 'https://play.google.com/store/apps/');
                    const card = document.createElement('div');
                    card.className = 'watch-card bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-800 shadow-xl';
                    
                    card.innerHTML = `
                        <div class="aspect-square">
                            <img src="${face.image_url}" alt="${face.title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300/171717/888888?text=Watch+Face'">
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-md mb-1 truncate">${face.title}</h3>
                            <p class="text-[10px] text-amber-500 font-bold mb-4">${face.badge_text || 'PREMIUM'}</p>
                            <a href="${webUrl}" target="_blank" class="block text-center bg-neutral-800 hover:bg-amber-600 py-2 rounded-xl text-xs font-bold transition-all">
                                GET IT
                            </a>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                gallery.innerHTML = `<p class="text-red-500 text-center col-span-full">Sync Error. Please check Play Store.</p>`;
            }
        }
        loadGallery();
    </script>
</body>
</html>
