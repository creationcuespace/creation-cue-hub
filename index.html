<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Wear OS Hub</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c;
            --bg: #050505;
            --card-bg: #111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        header {
            position: relative;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('logo-back.png');
            background-size: cover;
            background-position: center;
        }

        .logo { max-width: 90px; margin-bottom: 15px; }
        h1 { font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary); }
        .tagline { color: var(--text-dim); font-size: 1rem; margin-top: 10px; }

        /* Stats Grid */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1100px;
            margin: -30px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .stat-value { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 5px; }

        /* Watch Face Container (Carousel on Mobile / Grid on Desktop) */
        .content-width { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #faces-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .face-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
            transition: transform 0.3s;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: black;
            font-weight: 900;
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 5;
        }

        .face-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .btn-play {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            margin-top: 5px;
            width: 90%;
        }

        /* Responsive Settings for Phone (Carousel Mode) */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stats-container { grid-template-columns: 1fr 1fr; }

            /* Carousel Magic */
            #faces-container {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 10px;
                padding-bottom: 20px;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }
            #faces-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

            .face-card {
                flex: 0 0 31%; /* Shows 3 per view roughly */
                min-width: 110px;
                padding: 10px;
                scroll-snap-align: center;
            }

            .face-card h3 { font-size: 0.7rem; margin: 5px 0; }
            .btn-play { font-size: 0.6rem; padding: 6px 5px; }
            .badge { font-size: 0.5rem; padding: 2px 5px; }
        }

        footer { 
            text-align: center; 
            padding: 60px 20px; 
            color: #444; 
            font-size: 0.8rem;
            border-top: 1px solid #111;
        }

        .footer-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .footer-link { color: var(--primary); text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png" alt="Creation Cue" class="logo">
        <h1>CREATION <span>CUE</span></h1>
        <p class="tagline">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="stats-container">
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-card">
            <span class="stat-value">300K+</span>
            <span class="stat-label">Total Downloads</span>
        </a>
        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Pers.)</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Dev Rank</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Unique Designs</span>
        </div>
    </section>

    <div class="content-width">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; font-size: 1.2rem;">Featured Designs</h2>
            <span style="color: #666; font-size: 0.7rem; font-weight: bold;">SWIPE TO BROWSE</span>
        </div>
        <div id="faces-container">
            <!-- Content loaded via JavaScript -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Creation Cue. Stats via AppBrain.</p>
        <div class="footer-links">
            <a href="mailto:creationcuespace@gmail.com" class="footer-link">Email Us</a>
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const container = document.getElementById('faces-container');
            try {
                const response = await fetch('badge_text_faces.json');
                const data = await response.json();

                // 1. Exclude the first 2 cards
                const facesToShow = data.watch_faces.slice(2);

                facesToShow.forEach((face, index) => {
                    const div = document.createElement('div');
                    div.className = 'face-card';

                    const playUrl = face.play_store_url.replace('market://details?id=', 'https://play.google.com/store/apps/details?id=');
                    
                    // 2. Change text for the LAST card
                    const isLast = index === facesToShow.length - 1;
                    const buttonText = isLast ? "CreationCue" : "GOOGLE PLAY";

                    const badgeHtml = face.badge_text ? `<div class="badge">${face.badge_text}</div>` : '';

                    div.innerHTML = `
                        ${badgeHtml}
                        <img src="${face.image_url}" alt="${face.title}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3 style="margin: 10px 0;">${face.title}</h3>
                        <a href="${playUrl}" target="_blank" class="btn-play">${buttonText}</a>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="text-align:center; width:100%;">Failed to load designs.</p>`;
            }
        }

        loadContent();
    </script>
</body>
</html>
