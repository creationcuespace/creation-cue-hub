<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue Hub</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        :root {
            --primary-bg: #121212;
            --text-color: #ffffff;
            --accent: #00e676;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Banner Section */
        .banner {
            width: 100%;
            height: 400px;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://scontent.fath5-1.fna.fbcdn.net/v/t39.30808-6/650335507_918774504454114_5325023990017279542_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=2a1932&_nc_ohc=6lAHD4nObCIQ7kNvwGSBFvj&_nc_oc=AdnoQBo7VBUJQF4bPAWNbecga_0GjhFiTMGomGt8zrPOdU12IEHH3M4jbcyOoK4tYiU&_nc_zt=23&_nc_ht=scontent.fath5-1.fna&_nc_gid=WbRvuvHwCa7LafZAcAAXaw&_nc_ss=8&oh=00_AfzzbMZC7xwWVQ4XkN-XU6tFMi_uFL_ZLuvjIZz7-lG1vQ&oe=69BD6B59');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Carousel Layout */
        .carousel-wrapper {
            position: relative;
            padding: 40px 0;
            max-width: 1400px;
            margin: 0 auto;
        }

        .carousel-track {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        /* Small Screen PC Specific Styles (Scrollable with Arrows) */
        @media screen and (max-width: 1366px) {
            .carousel-track {
                display: flex;
                overflow-x: auto;
                scroll-behavior: smooth;
                scrollbar-width: none; /* Firefox */
                gap: 30px;
                padding: 10px 60px;
            }

            .carousel-track::-webkit-scrollbar {
                display: none; /* Chrome/Safari */
            }

            .nav-btn {
                display: flex;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: rgba(0, 0, 0, 0.7);
                color: white;
                border: 2px solid var(--accent);
                border-radius: 50%;
                width: 50px;
                height: 50px;
                cursor: pointer;
                justify-content: center;
                align-items: center;
                font-size: 24px;
                z-index: 100;
                transition: 0.3s;
            }

            .nav-btn:hover { background: var(--accent); color: black; }
            .prev { left: 10px; }
            .next { right: 10px; }
        }

        /* Hidden on Large Desktop */
        @media screen and (min-width: 1367px) {
            .nav-btn { display: none; }
        }

        .face-card {
            min-width: 250px;
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
        }

        .face-card:hover { transform: scale(1.05); }
        .face-card img { width: 100%; display: block; }
        .face-card h3 { margin: 15px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="banner">
        <h1>Watch Face Collection</h1>
    </header>

    <div class="carousel-wrapper">
        <button class="nav-btn prev" onclick="scrollCarousel(-300)">&#10094;</button>
        
        <div class="carousel-track" id="carousel-track">
            </div>

        <button class="nav-btn next" onclick="scrollCarousel(300)">&#10095;</button>
    </div>

    <script>
        const track = document.getElementById('carousel-track');
        const jsonUrl = 'https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/badge_text_faces.json';

        async function loadFaces() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();

                // EXCLUDE THE FIRST 2 FACES
                const filteredData = data.slice(2);

                filteredData.forEach(face => {
                    const card = document.createElement('div');
                    card.className = 'face-card';
                    card.innerHTML = `
                        <img src="${face.image_url}" alt="${face.name}">
                        <h3>${face.name}</h3>
                        <a href="${face.store_url}" target="_blank" style="color: var(--accent); text-decoration: none; padding-bottom: 15px; display: inline-block;">View on Store</a>
                    `;
                    track.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading watch faces:", error);
            }
        }

        function scrollCarousel(distance) {
            track.scrollBy({ left: distance, behavior: 'smooth' });
        }

        loadFaces();
    </script>
</body>
</html>
