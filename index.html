<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Wear OS Hub</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c;
            --bg: #050505;
            --card-bg: #111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        header {
            position: relative;
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('logo-back.png');
            background-size: cover;
            background-position: center;
        }

        .logo { max-width: 100px; margin-bottom: 20px; }
        h1 { font-size: 3rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary); }
        .tagline { color: var(--text-dim); font-size: 1.1rem; margin-top: 10px; }

        /* Stats Grid */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 30px 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); background: #181818; }
        .stat-value { display: block; font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-top: 5px; }

        /* Watch Face Grid */
        .content-width { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #faces-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .face-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: black;
            font-weight: 900;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            z-index: 5;
        }

        .face-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        .face-card:hover img { transform: scale(1.05); }

        .btn-play {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        /* Footer Styles */
        footer { 
            text-align: center; 
            padding: 80px 20px; 
            color: #666; 
            font-size: 0.9rem;
            border-top: 1px solid #111;
            margin-top: 50px;
        }

        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .footer-link:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .stats-container { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png" alt="Creation Cue" class="logo">
        <h1>CREATION <span>CUE</span></h1>
        <p class="tagline">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="stats-container">
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-card">
            <span class="stat-value">300K+</span>
            <span class="stat-label">Total Downloads</span>
        </a>
        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Personalization)</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Dev Rank</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Unique Designs</span>
        </div>
    </section>

    <div class="content-width">
        <h2 style="margin-bottom: 30px; letter-spacing: 1px;">Featured Designs</h2>
        <div id="faces-container">
            <!-- Data loads here via script -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Creation Cue. All stats verified via AppBrain.</p>
        <div class="footer-links">
            <!-- Restored Email Link -->
            <a href="mailto:creationcuespace@gmail.com" class="footer-link">creationcuespace@gmail.com</a>
            <!-- Restored Privacy Link -->
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const container = document.getElementById('faces-container');
            try {
                const response = await fetch('badge_text_faces.json');
                const data = await response.json();

                // 1. Exclude first 2 cards
                const facesToShow = data.watch_faces.slice(2);

                facesToShow.forEach((face, index) => {
                    const div = document.createElement('div');
                    div.className = 'face-card';

                    const playUrl = face.play_store_url.replace('market://details?id=', 'https://play.google.com/store/apps/details?id=');
                    
                    // 2. Change text for the LAST card
                    const isLast = index === facesToShow.length - 1;
                    const buttonText = isLast ? "CreationCue" : "GET IT ON GOOGLE PLAY";

                    const badgeHtml = face.badge_text ? `<div class="badge">${face.badge_text}</div>` : '';

                    div.innerHTML = `
                        ${badgeHtml}
                        <img src="${face.image_url}" alt="${face.title}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3 style="margin: 10px 0; font-size: 1rem;">${face.title}</h3>
                        <a href="${playUrl}" target="_blank" class="btn-play">${buttonText}</a>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error("Error loading JSON:", e);
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #666;">Unable to load designs at this moment.</p>`;
            }
        }

        loadContent();
    </script>
</body>
</html>
