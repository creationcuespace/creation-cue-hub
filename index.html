<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Premium Watch Faces</title>
    
    <link rel="icon" type="image/png" href="https://creationcue.space/wp-content/uploads/2025/05/ccLogo-3.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .gradient-text { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .custom-banner {
            background-image: linear-gradient(to bottom, rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 0.9)), 
                              url('https://scontent.fath5-1.fna.fbcdn.net/v/t39.30808-6/650335507_918774504454114_5325023990017279542_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=2a1932&_nc_ohc=6lAHD4nObCIQ7kNvwGSBFvj&_nc_oc=AdnoQBo7VBUJQF4bPAWNbecga_0GjhFiTMGomGt8zrPOdU12IEHH3M4jbcyOoK4tYiU&_nc_zt=23&_nc_ht=scontent.fath5-1.fna&_nc_gid=WbRvuvHwCa7LafZAcAAXaw&_nc_ss=8&oh=00_AfzzbMZC7xwWVQ4XkN-XU6tFMi_uFL_ZLuvjIZz7-lG1vQ&oe=69BD6B59');
            background-size: cover;
            background-position: center;
        }

        @media (max-width: 768px) {
            .mobile-carousel {
                display: flex !important;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 16px;
                padding-bottom: 20px;
                scrollbar-width: none;
            }
            .mobile-carousel::-webkit-scrollbar { display: none; }
            .watch-card { flex: 0 0 80%; scroll-snap-align: center; }
            .nav-arrow { display: none !important; }
        }

        @media (min-width: 769px) and (max-width: 1366px) {
            .mobile-carousel {
                display: flex !important;
                overflow-x: auto;
                scroll-behavior: smooth;
                gap: 20px;
                padding: 10px 0;
                scrollbar-width: none;
            }
            .mobile-carousel::-webkit-scrollbar { display: none; }
            .watch-card { flex: 0 0 30%; }
            .nav-arrow { display: flex !important; }
        }

        @media (min-width: 1367px) {
            .nav-arrow { display: none !important; }
        }

        .watch-card:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: #fbbf24; }
        .stat-card:hover { border-color: #fbbf24; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans">

    <header class="relative py-24 px-6 text-center border-b border-neutral-800 custom-banner">
        <img src="https://creationcue.space/wp-content/uploads/2025/05/ccLogo-3.png" alt="Creation Cue Logo" class="h-24 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(251,191,36,0.6)]">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter">CREATION <span class="gradient-text">CUE</span></h1>
        <p class="text-lg text-neutral-200 max-w-2xl mx-auto drop-shadow-md">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 text-center">
            <a href="https://www.appbrain.com/dev/Creation+Cue/" target="_blank" class="stat-card bg-neutral-900 p-4 rounded-2xl border border-neutral-800 block">
                <i class="fas fa-trophy text-amber-500 mb-2"></i>
                <h3 class="font-bold text-sm">#2 S. Korea</h3>
            </a>
            <a href="https://www.youtube.com/watch?v=zoD0DCDpLrA&list=PLq_hih0jW64xYQhELgx--6_NI9pwlsRbD&index=1" target="_blank" class="stat-card bg-neutral-900 p-4 rounded-2xl border border-neutral-800 block">
                <i class="fab fa-youtube text-red-600 mb-2"></i>
                <h3 class="font-bold text-sm">Featured</h3>
            </a>
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fas fa-handshake text-blue-500 mb-2"></i>
                <h3 class="font-bold text-sm">Huawei Partner</h3>
            </div>
            <div class="bg-neutral-900 p-4 rounded-2xl border border-neutral-800">
                <i class="fas fa-star text-yellow-400 mb-2"></i>
                <h3 class="font-bold text-sm">Top 1% Dev</h3>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-12 px-6 relative">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-2xl font-bold italic">Featured Designs</h2>
            <p class="text-xs text-neutral-500 md:hidden">Swipe to explore →</p>
        </div>
        
        <button onclick="scrollGallery(-300)" class="nav-arrow absolute left-0 top-1/2 z-10 -translate-y-1/2 bg-black/60 border border-neutral-700 w-12 h-12 rounded-full hidden items-center justify-center hover:bg-amber-500 transition-colors">
            <i class="fas fa-chevron-left"></i>
        </button>

        <div id="watch-gallery" class="mobile-carousel grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <button onclick="scrollGallery(300)" class="nav-arrow absolute right-0 top-1/2 z-10 -translate-y-1/2 bg-black/60 border border-neutral-700 w-12 h-12 rounded-full hidden items-center justify-center hover:bg-amber-500 transition-colors">
            <i class="fas fa-chevron-right"></i>
        </button>
    </section>

    <footer class="py-12 border-t border-neutral-900 text-center text-neutral-600">
        <div class="flex justify-center gap-6 mb-4">
            <a href="mailto:support@creationcue.space" class="hover:text-amber-500"><i class="fas fa-envelope"></i></a>
            <a href="https://play.google.com/store/apps/dev?id=7609098870161748513" class="hover:text-amber-500"><i class="fab fa-google-play"></i></a>
        </div>
        <p class="text-xs uppercase tracking-widest">&copy; 2026 Creation Cue Space</p>
    </footer>

    <script>
        const JSON_URL = 'https://cdn.jsdelivr.net/gh/creationcuespace/creation-cue-hub@main/badge_text_faces.json';

        async function loadGallery() {
            const gallery = document.getElementById('watch-gallery');
            try {
                const response = await fetch(JSON_URL);
                const rawData = await response.json();
                
                // EXCLUDE 2 FIRST FACES
                const data = rawData.watch_faces.slice(2);
                
                gallery.innerHTML = ''; 

                data.forEach((face, index) => {
                    let webUrl = face.play_store_url.replace('market://', 'https://play.google.com/store/apps/');
                    const isLast = index === data.length - 1; 
                    
                    const card = document.createElement('a'); 
                    card.href = webUrl;
                    card.target = "_blank";
                    card.className = 'watch-card block bg-neutral-900 rounded-3xl overflow-hidden border border-neutral-800 shadow-xl no-underline text-inherit transition-all';
                    
                    card.innerHTML = `
                        <div class="aspect-square">
                            <img src="${face.image_url}" alt="${face.title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300/171717/888888?text=Watch+Face'">
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-md mb-1 truncate">${face.title}</h3>
                            <p class="text-[10px] text-amber-500 font-bold mb-4">${face.badge_text || 'PREMIUM'}</p>
                            <div class="text-center ${isLast ? 'text-neutral-500 italic' : 'bg-neutral-800 hover:bg-amber-600 py-2 rounded-xl text-xs font-bold transition-all'}">
                                ${isLast ? 'CreationCue' : 'GET IT'}
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (error) {
                gallery.innerHTML = `<p class="text-red-500 text-center col-span-full">Sync Error. Please check Play Store.</p>`;
            }
        }

        function scrollGallery(amount) {
            const gallery = document.getElementById('watch-gallery');
            gallery.scrollBy({ left: amount, behavior: 'smooth' });
        }

        loadGallery();
    </script>
</body>
</html>
