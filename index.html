<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Wear OS Hub</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c;
            --bg: #050505;
            --card-bg: #111;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        header {
            position: relative;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('logo-back.png');
            background-size: cover;
            background-position: center;
        }

        .logo { max-width: 90px; margin-bottom: 15px; }
        h1 { font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary); }
        .tagline { color: var(--text-dim); font-size: 1rem; margin-top: 10px; }

        /* Stats Grid */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1100px;
            margin: -30px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .stat-value { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 5px; }

        /* Layout Container */
        .content-width { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #faces-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Clickable Card Link */
        .face-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: pointer;
        }

        .face-card:hover { border-color: var(--primary); background: #181818; transform: translateY(-5px); }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: black;
            font-weight: 900;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            z-index: 5;
        }

        .face-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: transform 0.3s;
        }
        .face-card:hover img { transform: scale(1.05); }

        .btn-play {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 10px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-top: 10px;
            width: 85%;
        }

        /* Mobile Carousel (3 visible) */
        @media (max-width: 768px) {
            #faces-container {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 12px;
                padding-bottom: 20px;
                scrollbar-width: none;
            }
            #faces-container::-webkit-scrollbar { display: none; }
            .face-card {
                flex: 0 0 31%; /* Shows roughly 3 */
                min-width: 110px;
                padding: 10px;
                scroll-snap-align: center;
            }
            .face-card h3 { font-size: 0.7rem; margin: 5px 0; }
            .btn-play { font-size: 0.55rem; padding: 6px 2px; }
            .badge { font-size: 0.45rem; top: 8px; right: 8px; }
        }

        footer { text-align: center; padding: 60px 20px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }
        .footer-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .footer-link { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/refs/heads/main/images/logo.png" alt="Creation Cue" class="logo">
        <h1>CREATION <span>CUE</span></h1>
        <p class="tagline">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="stats-container">
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-card">
            <span class="stat-value">300K+</span>
            <span class="stat-label">Total Downloads</span>
        </a>
        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Pers.)</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Dev Rank</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Unique Designs</span>
        </div>
    </section>

    <div class="content-width">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin:0; font-size: 1.2rem;">FEATURED DESIGNS</h2>
            <span style="color: #444; font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;">SWIPE TO BROWSE</span>
        </div>
        <div id="faces-container">
            <!-- Loading designs... -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Creation Cue. Stats via AppBrain.</p>
        <div class="footer-links">
            <a href="mailto:creationcuespace@gmail.com" class="footer-link">Email Us</a>
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const container = document.getElementById('faces-container');
            try {
                // Pointing to your JSON file
                const response = await fetch('badge_text_faces.json');
                const data = await response.json();

                // 1. SKIP the first 2 cards automatically
                const facesToShow = data.watch_faces.slice(2);

                facesToShow.forEach((face, index) => {
                    // Create the whole card as a link
                    const card = document.createElement('a');
                    card.className = 'face-card';
                    card.target = '_blank';

                    // 2. CONVERT market:// to https:// automatically via script
                    let rawUrl = face.play_store_url;
                    let webUrl = rawUrl;

                    if (rawUrl.startsWith('market://details?id=')) {
                        webUrl = rawUrl.replace('market://details?id=', 'https://play.google.com/store/apps/details?id=');
                    } else if (rawUrl.startsWith('market://dev?id=')) {
                        webUrl = rawUrl.replace('market://dev?id=', 'https://play.google.com/store/apps/dev?id=');
                    }
                    
                    card.href = webUrl;

                    // 3. TARGET last card dynamically for special text
                    const isLast = index === facesToShow.length - 1;
                    const buttonText = isLast ? "CreationCue" : "GOOGLE PLAY";

                    const badgeHtml = face.badge_text ? `<div class="badge">${face.badge_text}</div>` : '';

                    card.innerHTML = `
                        ${badgeHtml}
                        <img src="${face.image_url}" alt="${face.title}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3 style="margin: 10px 0; font-size: 0.9rem;">${face.title}</h3>
                        <div class="btn-play">${buttonText}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("JSON Link/Load error:", e);
                container.innerHTML = `<p style="text-align:center; width:100%; color:#555;">Failed to load designs.</p>`;
            }
        }

        loadContent();
    </script>
</body>
</html>
