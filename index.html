<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Wear OS Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c; /* The gold/orange from your logo */
            --bg: #000000;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Hero Header Section */
        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #2a0a0a 0%, #000000 100%);
        }

        .logo-container img {
            max-width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        h1 span { color: var(--primary); }

        .tagline {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* NEW: Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-value {
            display: block;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .stat-link {
            text-decoration: none;
            color: inherit;
        }

        /* Carousel Section Styling */
        .section-title {
            max-width: 1100px;
            margin: 40px auto 20px;
            padding: 0 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .live-badge {
            background: #d32f2f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        #carousel-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .watch-face-card {
            flex: 0 0 280px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid #222;
        }

        .watch-face-card img {
            width: 100%;
            border-radius: 50%; /* Traditional watch face look */
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .watch-face-card h3 {
            font-size: 1rem;
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-install {
            display: inline-block;
            background: var(--primary);
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Footer Icons */
        footer {
            padding: 60px 20px;
            text-align: center;
            opacity: 0.6;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .footer-nav img {
            width: 24px;
            filter: grayscale(1) invert(1);
            transition: 0.3s;
        }

        .footer-nav img:hover { filter: none; opacity: 1; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Replace with your actual logo path if different -->
            <img src="https://creationcuespace.github.io/creation-cue-hub/logo.png" alt="Creation Cue Logo">
        </div>
        <h1>CREATION <span>CUE</span></h1>
        <p class="tagline">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <!-- NEW STATS GRID -->
    <section class="stats-grid">
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-link">
            <div class="stat-card">
                <span class="stat-value">300K+</span>
                <span class="stat-label">Total Downloads</span>
            </div>
        </a>
        
        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Personalization)</span>
        </div>

        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Developer</span>
        </div>

        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Unique Designs</span>
        </div>
    </section>

    <div class="section-title">
        <span>Featured Designs</span>
        <span class="live-badge">Trending Now</span>
    </div>

    <!-- CAROUSEL (Populated by Script) -->
    <div id="carousel-container">
        <!-- JS will inject cards here -->
    </div>

    <footer>
        <div class="footer-nav">
            <!-- Replicating your footer icons -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg" alt="Android">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" style="width: 100px; filter:none;" alt="Get it on Play Store">
        </div>
        <p style="font-size: 0.8rem; color: #555;">&copy; 2026 Creation Cue. All statistics verified via AppBrain.</p>
    </footer>

    <!-- YOUR ORIGINAL SCRIPT (No changes to logic) -->
    <script>
        const carouselContainer = document.getElementById('carousel-container');

        async function loadWatchFaces() {
            try {
                // Fetching from your actual JSON path
                const response = await fetch('https://raw.githubusercontent.com/creationcuespace/creation-cue-hub/main/faces.json');
                const faces = await response.json();

                faces.forEach(face => {
                    const card = document.createElement('div');
                    card.className = 'watch-face-card';
                    card.innerHTML = `
                        <img src="${face.image}" alt="${face.name}" onerror="this.src='https://via.placeholder.com/300?text=Watch+Face'">
                        <h3>${face.name}</h3>
                        <a href="${face.url}" target="_blank" class="btn-install">Get it on Play Store</a>
                    `;
                    carouselContainer.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading faces:', error);
                carouselContainer.innerHTML = '<p style="text-align:center; width:100%;">Failed to load designs. Please check back later.</p>';
            }
        }

        loadWatchFaces();
    </script>

</body>
</html>
