<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creation Cue | Wear OS Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1b31c;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        /* Restoring your original Header Style */
        header {
            position: relative;
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo-back.png');
            background-size: cover;
            background-position: center;
        }

        .logo {
            max-width: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 span { color: var(--primary); }

        .tagline {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Improved Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            padding: 30px 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            background: #181818;
        }

        .stat-value {
            display: block;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Carousel/Grid Section */
        .content-width {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #faces-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .face-card {
            background: #111;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
        }

        .face-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .btn-play {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .stats-container { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Creation Cue" class="logo">
        <h1>CREATION <span>CUE</span></h1>
        <p class="tagline">Masterfully crafted Wear OS watch faces.</p>
    </header>

    <section class="stats-container">
        <!-- Linking the 300K card to your AppBrain profile -->
        <a href="https://www.appbrain.com/dev/Creation+Cue" target="_blank" class="stat-card">
            <span class="stat-value">300K+</span>
            <span class="stat-label">Total Downloads</span>
        </a>

        <div class="stat-card">
            <span class="stat-value">#2</span>
            <span class="stat-label">S. Korea (Personalization)</span>
        </div>

        <div class="stat-card">
            <span class="stat-value">Top 1%</span>
            <span class="stat-label">Global Dev Rank</span>
        </div>

        <div class="stat-card">
            <span class="stat-value">111+</span>
            <span class="stat-label">Premium Designs</span>
        </div>
    </section>

    <div class="content-width">
        <div class="section-header">
            <h2 style="margin:0;">Featured Designs</h2>
            <span style="background: #d32f2f; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;">TRENDING</span>
        </div>

        <div id="faces-container">
            <!-- Faces will load here -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Creation Cue. Verified via Google Play & AppBrain.</p>
    </footer>

    <script>
        // Use relative path 'badge_text_faces.json' just like your original working code
        async function loadContent() {
            const container = document.getElementById('faces-container');
            try {
                const response = await fetch('badge_text_faces.json');
                if (!response.ok) throw new Error('Failed to load JSON');
                
                const data = await response.json();

                data.forEach(face => {
                    const div = document.createElement('div');
                    div.className = 'face-card';
                    div.innerHTML = `
                        <img src="${face.image}" alt="${face.name}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3 style="margin: 10px 0; font-size: 1rem;">${face.name}</h3>
                        <a href="${face.url}" target="_blank" class="btn-play">GET IT ON GOOGLE PLAY</a>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #666;">Unable to load designs at this moment.</p>`;
            }
        }

        loadContent();
    </script>
</body>
</html>
